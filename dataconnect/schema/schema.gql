type User @table {
  username: String!
  email: String!
  createdAt: Timestamp!
  firstName: String
  lastName: String
  isActive: Boolean
  lastLoginAt: Timestamp
}

type Post @table {
  user: User
  title: String!
  content: String!
  createdAt: Timestamp!
  imageUrl: String
  category: String
}

type Comment @table {
  user: User
  paragraph: Post
  content: String!
  createdAt: Timestamp!
  parentCommentId: UUID
}

type ActivityLog @table {
  user: User
  eventType: String!
  timestamp: Timestamp!
  description: String!
  affectedUserId: UUID
  affectedPostId: UUID
  affectedCommentId: UUID
}